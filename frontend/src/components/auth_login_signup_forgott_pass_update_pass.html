<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Pieceworks Zambia</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Same font as main site: Segoe UI / system-ui -->
    <style>
        /* ====== CSS VARIABLES & RESET (copied from main site) ====== */
        :root {
            --primary-blue: #0F2B5B;
            --secondary-orange: #F9A826;
            --accent-green: #2E8B57;
            --light-blue: #E8F1FF;
            --light-gray: #F8F9FA;
            --medium-gray: #6C757D;
            --dark-gray: #343A40;
            --white: #FFFFFF;
            --shadow: 0 2px 6px rgba(15, 43, 91, 0.08);
            --border-radius: 6px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--dark-gray);
            background-color: var(--light-blue); /* softer background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ====== LOGIN CARD ====== */
        .login-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow), 0 4px 12px rgba(15, 43, 91, 0.12);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid rgba(15, 43, 91, 0.1);
        }

        .login-card h1 {
            color: var(--primary-blue);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            text-align: center;
        }

        .login-card h1 strong {
            color: var(--secondary-orange);
        }

        .login-card .subhead {
            color: var(--medium-gray);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--light-gray);
            padding: 0.25rem;
            border-radius: 40px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem 1rem;
            font-weight: 600;
            color: var(--medium-gray);
            cursor: pointer;
            border-radius: 40px;
            transition: var(--transition);
            font-size: 1rem;
        }

        .tab.active {
            background: var(--white);
            color: var(--primary-blue);
            box-shadow: var(--shadow);
        }

        /* Forms */
        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form h3 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .form p {
            color: var(--medium-gray);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        label {
            font-weight: 600;
            color: var(--primary-blue);
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(15, 43, 91, 0.2);
            border-radius: 40px; /* rounded like search bar */
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            background: var(--white);
        }

        input:focus, select:focus {
            border-color: var(--secondary-orange);
            box-shadow: 0 0 0 3px rgba(249, 168, 38, 0.2);
        }

        .row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .row > * {
            flex: 1;
        }

        /* Gender options */
        .gender-options {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .gender-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            color: var(--dark-gray);
            cursor: pointer;
        }

        .gender-options input[type="radio"] {
            width: auto;
            margin-bottom: 0;
            accent-color: var(--secondary-orange);
        }

        /* Button */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            text-align: center;
            background: var(--secondary-orange);
            color: var(--primary-blue);
            margin-top: 0.5rem;
        }

        .btn:hover {
            background-color: #e6971f;
        }

        .link {
            display: inline-block;
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 1rem;
            transition: var(--transition);
        }

        .link:hover {
            color: var(--secondary-orange);
            text-decoration: underline;
        }

        .terms {
            font-size: 0.8rem;
            color: var(--medium-gray);
            margin-top: 1.5rem;
            text-align: center;
        }

        .terms a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .terms a:hover {
            color: var(--secondary-orange);
        }

        /* back to home link */
        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: var(--primary-blue);
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-home a:hover {
            color: var(--secondary-orange);
        }

        /* birthday selects spacing */
        .birthday-row select {
            margin-bottom: 0;
        }

        /* small error/info text */
        small {
            color: var(--medium-gray);
            font-size: 0.8rem;
            display: block;
            margin-bottom: 0.8rem;
        }

        @media (max-width: 500px) {
            .login-card {
                padding: 1.5rem;
            }
            .row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>PIECEWORKS <strong>ZAMBIA</strong></h1>
        <div class="subhead">Connecting skills with opportunity</div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" id="loginTab">Log In</div>
            <div class="tab" id="createTab">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div class="form active" id="loginForm">
            <input type="text" id="loginPhone" placeholder="Phone number or email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button class="btn" id="loginBtn">Log In</button>
            <div style="text-align: center;">
                <a href="#" class="link">Forgot password?</a>
            </div>
        </div>

        <!-- Create Account Form -->
        <div class="form" id="createForm">
            <h3>Create a new account</h3>
            <p>It’s quick and easy.</p>

            <div class="row">
                <input type="text" id="firstName" placeholder="First name" required>
                <input type="text" id="lastName" placeholder="Last name" required>
            </div>

            <label>Birthday</label>
            <div class="row birthday-row">
                <select id="birthMonth" required>
                    <option value="">Month</option>
                    <option>Jan</option><option>Feb</option><option>Mar</option>
                    <option>Apr</option><option>May</option><option>Jun</option>
                    <option>Jul</option><option>Aug</option><option>Sep</option>
                    <option>Oct</option><option>Nov</option><option>Dec</option>
                </select>
                <select id="birthDay" required>
                    <option value="">Day</option>
                </select>
                <select id="birthYear" required>
                    <option value="">Year</option>
                </select>
            </div>

            <label>Gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="Female" required> Female</label>
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Custom"> Custom</label>
            </div>

            <label>Mobile number or email</label>
            <input type="text" id="phone" placeholder="e.g. +260 77 123 4567" required>

            <label>New password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>

            <button class="btn" id="createBtn">Sign Up</button>

            <div class="terms">
                By clicking Sign Up, you agree to our <a href="#">Terms</a>, 
                <a href="#">Privacy Policy</a> and <a href="#">Cookies Policy</a>.
            </div>
        </div>

        <!-- Back to home link -->
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        // Populate days and years
        const daySelect = document.getElementById('birthDay');
        const yearSelect = document.getElementById('birthYear');

        // Days 1-31
        for (let d = 1; d <= 31; d++) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            daySelect.appendChild(opt);
        }

        // Years from current down to 1940
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1940; y--) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
        }

        // Tab switching
        const loginTab = document.getElementById('loginTab');
        const createTab = document.getElementById('createTab');
        const loginForm = document.getElementById('loginForm');
        const createForm = document.getElementById('createForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            createTab.classList.remove('active');
            loginForm.classList.add('active');
            createForm.classList.remove('active');
        });

        createTab.addEventListener('click', () => {
            createTab.classList.add('active');
            loginTab.classList.remove('active');
            createForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // CREATE ACCOUNT
        document.getElementById('createBtn').addEventListener('click', () => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const birthMonth = document.getElementById('birthMonth').value;
            const birthDay = document.getElementById('birthDay').value;
            const birthYear = document.getElementById('birthYear').value;
            const gender = document.querySelector('input[name="gender"]:checked')?.value;
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!firstName || !lastName || !birthMonth || !birthDay || !birthYear || !gender || !phone || !password) {
                alert('Please fill in all required fields.');
                return;
            }

            // Get existing users from localStorage (using same key as main site)
            const users = JSON.parse(localStorage.getItem('pw_users')) || [];
            if (users.find(u => u.phone === phone)) {
                alert('An account with this phone/email already exists.');
                return;
            }

            // Create user object (matches structure expected by profile page)
            const user = {
                firstName,
                lastName,
                birthMonth,
                birthDay,
                birthYear,
                gender,
                phone,
                password,
                bio: "",
                skills: [],
                languages: [],
                pieceworks: []
            };

            users.push(user);
            localStorage.setItem('pw_users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(user));

            alert('Account created successfully!');
            window.location.href = 'profile.html'; // make sure profile.html exists
        });

        // LOGIN
        document.getElementById('loginBtn').addEventListener('click', () => {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const users = JSON.parse(localStorage.getItem('pw_users')) || [];

            const found = users.find(u => u.phone === phone && u.password === password);

            if (!found) {
                alert('Invalid phone/email or password.');
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify(found));
            window.location.href = 'profile.html'; // redirect to profile
        });
    </script>
</body>
</html>
